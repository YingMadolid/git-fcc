<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Playing Cards</title>
  <link rel="stylesheet" href="playing-cards.css"
</head>

<body>
  <h1> Playing Cards </h1>
  
  <main id="playing-cards">

    <div class="card">
      <div class="left">A♠</div>
      <div class="middle">
        <span>♠</span>
      </div>
      <div class="right">A♠</div>
    </div>

    <div class="card card2">
      <div class="left">A♥</div>
      <div class="middle">
        <span>♥</span>
      </div>
      <div class="right">A♥</div>
    </div>

    <div class="card card3">
      <div class="left">A♦</div>
      <div class="middle">
        <span>♦</span>
      </div>
      <div class="right">A♦</div>
    </div>

  </main>

</body>

</html>
