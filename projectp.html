<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <title>Product Landing Page</title>
    <link rel="stylesheet" href="projectp.css"
  </head>

<body>
 <header id="header">
        <img
            id="header-img"
            src="https://cdn.freecodecamp.org/testable-projects-fcc/images/product-landing-page-logo.png"
            alt="Company Logo"
        >

        <nav id="nav-bar">
            <a class="nav-link" href="#features">Features</a>
            <a class="nav-link" href="#video-section">Video</a>
            <a class="nav-link" href="#contact">Contact</a>
        </nav>
    </header>

    <main>

        <section id="features">
            <h2>Product Features</h2>
            <p>
                Our premium product is designed with quality materials,
                modern technology, and exceptional performance.
            </p>
        </section>

        <section id="video-section">
            <h2>Watch Our Product</h2>

            <iframe
                id="video"
                width="560"
                height="315"
                src="https://www.youtube.com/embed/y8Yv4pnO7qc"
                title="Product Video"
                allowfullscreen>
            </iframe>
        </section>

        <section id="contact">
            <h2>Subscribe for Updates</h2>

            <form
                id="form"
                action="https://www.freecodecamp.org/email-submit"
                method="post">

                <input
                    id="email"
                    type="email"
                    name="email"
                    placeholder="Enter your email address"
                    required>

                <input
                    id="submit"
                    type="submit"
                    value="Subscribe">

            </form>
        </section>

    </main>
</body>

</html>
